name: Unit And Integration Tests

on: [ push, pull_request ]

jobs:
  matrix-strategy-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          TASKS=$(echo $(cat .github/workflows/build-matrix.json) | sed 's/ //g')
          echo "matrix=$TASKS" >> $GITHUB_OUTPUT

  build:
    needs: matrix-strategy-setup
    name: ${{ matrix.config.os }} • ${{ matrix.config.cc }}-${{ matrix.config.compiler_version }} • ${{ matrix.config.build_type }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.matrix-strategy-setup.outputs.matrix) }}

    steps:
      - name: Checkout Mimir
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Show CMake Version
        run: cmake --version

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Set Environment Variables
        shell: bash
        run: |
          if [[ "${{ matrix.config.os }}" == "macos-latest" ]]; then
            echo "Skip for macos."
          else
            echo "CC=${{ matrix.config.cc }}-${{ matrix.config.compiler_version }}" >> "$GITHUB_ENV"
            echo "CXX=${{ matrix.config.cxx }}-${{ matrix.config.compiler_version }}" >> "$GITHUB_ENV"
          fi
          conan_home="$HOME/.conan2-${{ runner.os }}-${{ matrix.config.build_type }}-${{ matrix.config.cc }}-${{ matrix.config.compiler_version }}"
          echo "Conan Home is $conan_home"
          echo "CONAN_HOME=$conan_home" >> "$GITHUB_ENV"

      - name: Install conan
        id: conan
        shell: bash
        run: |
          python3 -m pip install --upgrade pip setuptools
          python3 -m pip install conan
          conan profile detect --name default

      - name: Cache Conan Dependencies Install
        id: cache-conan-deps
        uses: actions/cache@v4
        env:
          cache-name: cache-conan-deps
        with:
          path: "$CONAN_HOME"
          key: ${{ runner.os }}-${{ env.cache-name }}-${{ matrix.config.build_type }}-${{ matrix.config.cc }}-${{ matrix.config.compiler_version }}-${{ hashFiles('github.workspace/conandata.yml') }}-${{ hashFiles('github.workspace/conanfile.py') }}

      # Build step
      - name: Configure Mimir
        shell: bash
        run: |
          configure_cmd="\
          ./configure.sh \ 
          --source .  \
          --build build \ 
          --build_type=${{ matrix.config.build_type }} \ 
          -DBUILD_TESTS=ON"
          if [[ "${{ matrix.config.os }}" == "macos-latest" ]]; then
            alias gcc='gcc-14' && alias g++='g++-14' && eval "$configure_cmd"
          else
            eval "$configure_cmd"
          fi

      - name: Build Mimir
        run: |
          ./build.sh build

      - name: Upload build folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}_${{ matrix.config.cc }}-${{ matrix.config.compiler_version }}-${{ matrix.config.build_type }}
          path: build/
          retention-days: 1

  unit-test:
    needs: build
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download release folder
        uses: actions/download-artifact@v4
        with:
          pattern: build_release_${{ matrix.os }}
          path: build/release

      - name: Release Test
        working-directory: build/release/tests/unit
        run: GTEST_OUTPUT=xml:test-results/ GTEST_COLOR=1 ctest -V

      - name: Install
        run: |
          cmake --install build/release --prefix install

      - name: Upload installation as artifact
        uses: actions/upload-artifact@v4
        with:
          name: install_${{ matrix.os }}
          path: install
          retention-days: 1

  integration-test:
    needs: unit-test
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Mimir
        uses: actions/checkout@v4

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Show cmake version
        run: cmake --version

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Installed Mimir
        uses: actions/download-artifact@v4
        with:
          pattern: install_${{ matrix.os }}
          path: install

      - name: Configure Test Project
        shell: bash
        run: >
          cmake 
          -S tests/integration 
          -B tests/integration/build
          -DCMAKE_PREFIX_PATH=install

      - name: Build Test Project
        run: |
          cmake --build tests/integration/build

      - name: Run Test Project
        run: |
          cd tests/integration/build
          GTEST_COLOR=1 ctest -V